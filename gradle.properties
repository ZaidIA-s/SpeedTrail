org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# Jalankan compiler Kotlin di dalam proses Gradle, bukan daemon terpisah.
# Daemon Kotlin 2.0.21 (K2) gagal start di mesin ini; in-process melewati masalah itu.
kotlin.compiler.execution.strategy=in-process

android.useAndroidX=true
android.nonTransitiveRClass=true

kotlin.code.style=official
